<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUU Steak House - Paysandú</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --pure-black: #000000;
            --dark-gray: #121212;
            --card-bg: #1e1e1e;
            --whatsapp-green: #25d366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pure-black);
            color: var(--primary-yellow);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Banner Promocional Amarillo */
        .promo-banner {
            background: var(--primary-yellow);
            color: var(--pure-black);
            text-align: center;
            padding: 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Header con Logo - SIN VIDEO */
        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary-yellow);
            background: var(--pure-black);
        }

        .logo {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.5));
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            color: var(--primary-yellow);
            text-transform: uppercase;
            font-size: 2.2rem;
            margin-top: 60px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .instr {
            text-align: center;
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Carruseles Dinámicos Inteligentes */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 20px;
            border: 3px solid var(--primary-yellow);
            background: var(--dark-gray);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-slide {
            min-width: 100%;
            cursor: pointer;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
            transition: 0.4s;
        }

        .carousel-slide:hover img {
            filter: brightness(0.7);
            transform: scale(1.02);
        }

        /* Modal Popup Premium */
        .modal {
            display: none;
            position: fixed;
            z-index: 5000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 25px;
            text-align: center;
            overflow: hidden;
            border: 2px solid var(--primary-yellow);
            animation: zoomIn 0.3s;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-img { width: 100%; border-bottom: 2px solid var(--primary-yellow); }
        .modal-body { padding: 30px; }
        .modal-body h3 { color: var(--primary-yellow); margin-top: 0; font-size: 1.8rem; text-transform: uppercase; }
        .modal-body p { color: #fff; font-size: 1.2rem; }

        .btn-wa {
            display: inline-block;
            background: var(--primary-yellow);
            color: var(--pure-black);
            padding: 18px 35px;
            text-decoration: none;
            font-weight: 900;
            border-radius: 50px;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-wa:hover { background: #fff; transform: scale(1.05); }

        .close-modal {
            color: var(--primary-yellow);
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 50px;
            cursor: pointer;
        }

        /* Sección de Testimonios */
        .testimonials {
            margin-top: 100px;
            background: var(--dark-gray);
            padding: 50px 25px;
            border-radius: 25px;
            border: 1px solid #333;
        }

        .testimonial-item {
            border-left: 5px solid var(--primary-yellow);
            padding: 25px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.02);
            font-style: italic;
            color: #ddd;
            font-size: 1.1rem;
        }

        .testimonial-item strong {
            color: var(--primary-yellow);
            display: block;
            margin-top: 15px;
            font-style: normal;
            font-weight: bold;
        }

        /* WhatsApp Flotante */
        .wa-float {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background: var(--primary-yellow);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
            transition: 0.3s;
        }

        .wa-float:hover { transform: scale(1.1); }

        footer {
            text-align: center;
            padding: 80px 20px;
            color: #666;
            font-size: 1rem;
            border-top: 1px solid #222;
        }

        @media (max-width: 600px) {
            h2 { font-size: 1.8rem; }
            .logo { max-width: 220px; }
            .carousel-wrapper { border-radius: 10px; }
        }
    </style>
</head>
