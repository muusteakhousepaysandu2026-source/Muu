<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUU Steak House - Paysandú</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --pure-black: #000000;
            --dark-gray: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pure-black);
            color: var(--primary-yellow);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .promo-banner {
            background: var(--primary-yellow);
            color: var(--pure-black);
            text-align: center;
            padding: 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: var(--pure-black);
            border-bottom: 3px solid var(--primary-yellow);
        }

        .logo {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.4));
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            font-size: 2rem;
            margin-top: 60px;
            letter-spacing: 2px;
        }

        .instr {
            text-align: center;
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Diseño del Carrusel */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: 0 auto 50px;
            overflow: hidden;
            border-radius: 15px;
            border: 3px solid var(--primary-yellow);
            background: var(--dark-gray);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            cursor: pointer;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
        }

        /* Popup / Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 5000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            text-align: center;
            overflow: hidden;
            border: 2px solid var(--primary-yellow);
        }

        .modal-body { padding: 30px; }
        .modal-body h3 { color: var(--primary-yellow); margin: 0 0 15px; text-transform: uppercase; }
        .modal-body p { color: #fff; margin-bottom: 20px; }

        .btn-wa {
            display: inline-block;
            background: var(--primary-yellow);
            color: var(--pure-black);
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .close-modal {
            color: var(--primary-yellow);
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 45px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid #222;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="promo-banner">🔥 10% DE DESCUENTO EN TU PRIMERA COMPRA 🔥</div>

    <header>
        <img src="https://i.ibb.co/8LZB0vZL/retouch-2026020410202911.jpg" alt="MUU Steak House" class="logo">
    </header>

    <div class="container">
        
        <section>
            <h2>Packs Parrilleros</h2>
            <p class="instr">✨ Toca la imagen para ver detalle ✨</p>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="track-packs"></div>
            </div>
        </section>

        <section>
            <h2>Milanesas Artesanales</h2>
            <p class="instr">✨ Calidad de hogar en tu mesa ✨</p>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="track-milas"></div>
            </div>
        </section>

        <section>
            <h2>Cortes Premium</h2>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="track-premium"></div>
            </div>
        </section>

        <section>
            <h2>Elaborados de Autor</h2>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="track-elaborados"></div>
            </div>
        </section>

    </div>

    <div id="modal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImg" src="" style="width:100%">
            <div class="modal-body">
                <h3 id="modalTitle"></h3>
                <p id="modalDesc"></p>
                <a id="waLink" href="" class="btn-wa" target="_blank">PEDIR POR WHATSAPP</a>
            </div>
        </div>
    </div>

    <script>
        // DATOS DE LOS PACKS (ORDENADOS SEGÚN TU PEDIDO)
        const packs = [
            { url: 'https://i.ibb.co/sJs7gVsr/chorizos.jpg', title: 'Pack de Chorizos', desc: 'Chorizos de elaboración propia, pura carne.' },
            { url: 'https://i.ibb.co/M0sygrz/vacio.jpg', title: 'Pack de Vacío', desc: 'Manta de vacío seleccionada, terna y jugosa.' },
            { url: 'https://i.ibb.co/XrGVGc4h/asado.jpg', title: 'Pack Asado de Tira', desc: 'El clásico de la parrilla con el mejor corte.' },
            { url: 'https://i.ibb.co/BVPXLJ3v/cordero.jpg', title: 'Pack de Cordero', desc: 'Costilla, paleta y pernil de cordero fresco.' }
        ];

        // Rellenos temporales para las otras categorías
        const placeholder = [{ url: 'https://via.placeholder.com/600x600/000/fc0?text=Proximamente', title: 'Muy Pronto', desc: 'Estamos preparando las mejores fotos.' }];

        function initCarousel(id, data) {
            const track = document.getElementById(id);
            data.forEach(item => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.onclick = () => openModal(item.url, item.title, item.desc);
                slide.innerHTML = `<img src="${item.url}">`;
                track.appendChild(slide);
            });
            let index = 0;
            setInterval(() => {
                index = (index + 1) % data.length;
                track.style.transform = `translateX(-${index * 100}%)`;
            }, 3000);
        }

        function openModal(url, title, desc) {
            document.getElementById('modalImg').src = url;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('waLink').href = `https://wa.me/59892918013?text=Hola%20MUU!%20Quiero%20el%20${encodeURIComponent(title)}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Inicializar todos
        initCarousel('track-packs', packs);
        initCarousel('track-milas', placeholder);
        initCarousel('track-premium', placeholder);
        initCarousel('track-elaborados', placeholder);
    </script>
</body>
</html>
