<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUU Steakhouse | Premium Cuts</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            width: 100%;
            border-bottom: 2px solid var(--gold);
        }

        h1 { font-size: 2.5rem; letter-spacing: 4px; color: var(--gold); margin: 0; }
        p.subtitle { font-style: italic; color: #888; margin-top: 10px; }

        /* Galería de 3 Cuadros */
        .gallery-wrapper {
            width: 95%;
            max-width: 1100px;
            margin: 40px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .photo-box {
            flex: 1;
            height: 350px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            background: #000;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
        }

        .info-section {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .address { color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            color: #444;
            border-top: 1px solid #222;
            width: 100%;
            text-align: center;
        }

        @media (max-width: 600px) {
            .gallery-wrapper { flex-direction: column; align-items: center; }
            .photo-box { width: 100%; height: 250px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MUU STEAKHOUSE</h1>
        <p class="subtitle">La Fusión de la Excelencia: Carnes Premium & La Fábrica de la Milanesa</p>
    </header>

    <div class="info-section">
        <p class="address">📍 Ituzaingó 898, Paysandú</p>
        <p>Experimenta el sabor artesanal en cada corte.</p>
    </div>

    <div class="gallery-wrapper">
        <div class="photo-box" id="box1"></div>
        <div class="photo-box" id="box2"></div>
        <div class="photo-box" id="box3"></div>
    </div>

    <footer>
        &copy; 2026 MUU Steakhouse Paysandú - Calidad Garantizada
    </footer>

    <script>
        // Tus fotos de ImgBB integradas profesionalmente
        const images = [
            "https://i.ibb.co/9mWr3ZkT/IMG-20260424-WA0063.jpg",
            "https://i.ibb.co/G4yT7zJS/IMG-20260424-WA0062.jpg",
            "https://i.ibb.co/0R8JGDS3/IMG-20260424-WA0061.jpg",
            "https://i.ibb.co/Wj1dpJc/IMG-20260424-WA0060.jpg",
            "https://i.ibb.co/bRDv80QL/IMG-20260424-WA0058.jpg",
            "https://i.ibb.co/nMXG041N/IMG-20260424-WA0059.jpg",
            "https://i.ibb.co/Rp9zWcHT/IMG-20260424-WA0054.jpg",
            "https://i.ibb.co/chF3j7Gk/IMG-20260424-WA0057.jpg",
            "https://i.ibb.co/LdBY1RVB/IMG-20260424-WA0053.jpg",
            "https://i.ibb.co/99xWhPdw/IMG-20260424-WA0047.jpg",
            "https://i.ibb.co/LDHDQhW2/IMG-20260424-WA0046.jpg",
            "https://i.ibb.co/rfNTtVRS/IMG-20260424-WA0044.jpg",
            "https://i.ibb.co/gbJ5qHhW/IMG-20260424-WA0045.jpg",
            "https://i.ibb.co/ZR9wvp2P/IMG-20260424-WA0051.jpg",
            "https://i.ibb.co/Qv26g0j9/IMG-20260424-WA0042.jpg"
        ];

        let offset = 0;

        function updateDisplay() {
            const boxes = ['box1', 'box2', 'box3'];
            boxes.forEach((id, i) => {
                const imgIndex = (offset + i) % images.length;
                const container = document.getElementById(id);
                container.innerHTML = `<img src="${images[imgIndex]}" style="opacity: 0">`;
                // Efecto de suavizado al cambiar
                setTimeout(() => {
                    container.querySelector('img').style.opacity = '1';
                }, 50);
            });
        }

        function rotate() {
            offset = (offset + 1) % images.length;
            updateDisplay();
        }

        updateDisplay();
        setInterval(rotate, 4000); // Rota cada 4 segundos
    </script>
</body>
</html>
