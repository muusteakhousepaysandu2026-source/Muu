<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUU Steak House - Paysandú</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --pure-black: #000000;
            --dark-gray: #121212;
            --card-bg: #1e1e1e;
            --whatsapp-green: #25d366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pure-black);
            color: var(--primary-yellow);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Banner Promocional */
        .promo-banner {
            background: var(--primary-yellow);
            color: var(--pure-black);
            text-align: center;
            padding: 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Header / Logo */
        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary-yellow);
            background: linear-gradient(to bottom, #000, #111);
        }

        .logo {
            max-width: 260px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.4));
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            color: var(--primary-yellow);
            text-transform: uppercase;
            font-size: 2rem;
            margin-top: 60px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .instr {
            text-align: center;
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Carruseles Dinámicos */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid var(--primary-yellow);
            background: var(--dark-gray);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            cursor: pointer;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
            transition: 0.3s;
        }

        .carousel-slide:hover img {
            filter: brightness(0.6);
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 5000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
